{% extends 'base.html' %}
{% block title %}Pagina nao encontrada · Atendimento Pro{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-6 text-center">
    <div class="card app-card border-0 shadow-sm">
      <div class="card-body py-5">
        <h1 class="display-1 fw-bold text-muted">404</h1>
        <h2 class="h4 mb-3">Pagina nao encontrada</h2>
        <p class="text-muted mb-4">O endereco que voce tentou abrir nao existe.</p>
        <a href="{{ url_for('main.dashboard') if current_user.is_authenticated else url_for('auth.login') }}" class="btn btn-primary">Voltar ao inicio</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
