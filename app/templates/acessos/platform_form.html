{% extends 'base.html' %}
{% block title %}Nova Plataforma · RDCria{% endblock %}
{% block content %}

<div class="page-header mb-4">
  <div>
    <div class="eyebrow mb-2">Acessos</div>
    <h1 class="h3 mb-1">Nova plataforma</h1>
  </div>
  <a href="{{ url_for('main.acessos_list') }}" class="btn btn-outline-secondary">← Voltar</a>
</div>

<div class="card app-card border-0 shadow-sm" style="max-width:560px">
  <div class="card-body">
    <form method="post" class="row g-3">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
      <div class="col-12">
        <label class="form-label">Nome <span class="text-danger">*</span></label>
        <input type="text" class="form-control" name="name" required placeholder="Ex.: Netflix, Deezer, Globoplay">
      </div>
      <div class="col-12">
        <label class="form-label">URL de login</label>
        <input type="url" class="form-control" name="url" placeholder="Ex.: https://www.netflix.com/login">
      </div>
      <div class="col-12">
        <label class="form-label">Observações</label>
        <textarea class="form-control" name="notes" rows="2" placeholder="Informações adicionais"></textarea>
      </div>
      <div class="col-12">
        <button type="submit" class="btn btn-primary">Criar plataforma</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
