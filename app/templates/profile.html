{% extends 'base.html' %}
{% block title %}Perfil · Atendimento Pro{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card app-card border-0 shadow-sm">
      <div class="card-body">
        <div class="section-head mb-3">
          <div>
            <div class="eyebrow">Conta</div>
            <h1 class="h4 mb-1">Seu perfil</h1>
            <p class="section-subtitle mb-0">Atualize seu nome e senha de acesso.</p>
          </div>
        </div>

        <form method="post" class="row g-3">
          <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
          <div class="col-12">
            <label class="form-label">Nome</label>
            <input type="text" class="form-control" name="name" value="{{ current_user.name }}">
          </div>
          <div class="col-12">
            <label class="form-label">Nova senha <small class="text-muted">(deixe em branco para manter)</small></label>
            <input type="password" class="form-control" name="password" placeholder="Minimo 6 caracteres">
          </div>
          <div class="col-12">
            <label class="form-label">Confirmar nova senha</label>
            <input type="password" class="form-control" name="password_confirm" placeholder="Repita a senha">
          </div>
          <div class="col-12">
            <button type="submit" class="btn btn-primary">Salvar alteracoes</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
